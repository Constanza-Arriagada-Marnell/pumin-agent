# docker-compose.yml — Pumin 🐾
# Generated by setup.sh. Edit modules/docker-compose.yml.tpl to change.

services:
  pumin:
    image: agentic-pod:latest
    container_name: pumin
    build:
      context: ./docker
      args:
        UID: "501"
        GID: "20"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:size=100m
    restart: unless-stopped
    stop_grace_period: 30s
    # Container is healthy when both crond and the agent's tmux session are
    # running — same liveness signals start_services.sh's watchdog uses.
    # Healthcheck runs as root (Docker default), so we use pgrep instead of
    # `tmux has-session` (tmux's socket is per-UID under /tmp/tmux-<uid>/,
    # invisible to root). start_period is generous because first boot installs
    # plugins + warms up bun before the supervisor lays down the tmux session.
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x crond >/dev/null && pgrep -f 'tmux .*-s agent' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    stdin_open: true
    tty: true
    volumes:
      - ./:/workspace
      # State (login, pairing, sessions, plugin cache) lives inside the
      # workspace so the directory IS the agent — portable via rsync/cp,
      # immune to `docker compose down -v`, removed only with the
      # workspace itself.
      - ./.state:/home/agent
    environment:
      # User's timezone, propagated from agent.yml::user.timezone. Without
      # this (and tzdata in the image), Alpine falls back to UTC and the
      # heartbeat / agent timestamp logs in the wrong zone — surfaces as
      # "I logged this row at GMT-4 but the heartbeat says GMT+0" noise.
      TZ: "America/Santiago"
    env_file:
      - ./.env
